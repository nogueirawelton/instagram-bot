server {
  listen 80;

  auth_basic "Restricted";
  auth_basic_user_file /etc/nginx/.htpasswd;

  location = /apps/instagram-api {
    return 301 /apps/instagram-api/;
  }

  location /apps/instagram-api/api/ {
    proxy_pass http://server:3030/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /apps/instagram-api/media/ {
    proxy_pass http://server:3030/media/;
    proxy_set_header Host $host;
  }

  location /apps/instagram-api/ {
    alias /usr/share/nginx/html/;
    index index.html;
    try_files $uri $uri/ /apps/instagram-api/index.html;
  }
}
